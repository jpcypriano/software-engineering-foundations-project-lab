name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            if (!body.includes("## Description")) {
              core.setFailed("PR must include a Description section.");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("PR must include a Checklist section.");
            }

      - name: Check checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const unchecked = body.match(/- \[ \]/g);

            if (unchecked) {
              core.setFailed("All checklist items must be completed.");
            }
