name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Validar descrição da PR
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            if (!body.includes("## Description")) {
              core.setFailed("Missing '## Description' section.");
            }

            if (!body.includes("## Checklist")) {
              core.setFailed("Missing '## Checklist' section.");
            }

            if (!body.includes("## Related Issue")) {
              core.setFailed("Missing '## Related Issue' section.");
            }

      # Validar checklist
      - name: Check checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unchecked = body.match(/- \[ \]/g);

            if (unchecked) {
              core.setFailed("All checklist items must be completed.");
            }

      # 🔥 VALIDAÇÃO CORRETA (SEM origin/main)
      - name: Validate group folder changes
        run: |
          echo "Getting changed files from PR..."

          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          files=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          echo "Changed files:"
          echo "$files"

          group=$(echo "$files" | grep -o 'groups/group-[0-9]\+' | head -n 1)

          if [ -z "$group" ]; then
            echo "ERROR: No group folder detected!"
            exit 1
          fi

          invalid=$(echo "$files" | grep -v "$group")

          if [ ! -z "$invalid" ]; then
            echo "ERROR: You modified files outside your group folder!"
            exit 1
          fi

      # Validar padrão da branch
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"

          echo "Branch name: $branch"

          if [[ ! "$branch" =~ ^group-[0-9]+-.*$ ]]; then
            echo "ERROR: Branch name must follow pattern 'group-XX-description'"
            exit 1
          fi
